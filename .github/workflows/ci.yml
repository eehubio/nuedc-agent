name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支的新推送取消旧的运行，节省额度
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # 集成测试用进程内 Postgres（pglite），不需要外部数据库服务。
      # 这里给一个占位串，仅用于让 lib/db.ts 的 conn() 不抛「缺少 DATABASE_URL」。
      DATABASE_URL: postgres://mock/mock
      PGLITE_TEST: "1"
      ENABLE_MOCK_PROVIDER: "1"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
