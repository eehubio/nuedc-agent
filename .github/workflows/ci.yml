name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # 手工触发：用于验证 Actions 本身是否被启用（仓库设置 / 组织策略问题的排查入口）
  workflow_dispatch:

# 同一分支的新推送取消旧的运行，节省额度
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# 显式声明权限：仓库若把默认工作流权限设为 restricted，
# 缺少 checks:write 会导致运行结果不回写到 commit checks（看起来像"CI 没跑"）。
permissions:
  contents: read
  checks: write
  statuses: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # queue-only 冒烟需要真实数据库：没有它所有入队都会 503，验收门禁必然红灯
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_USER: ci
          POSTGRES_DB: nuedc_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    strategy:
      fail-fast: false
      matrix:
        # Node 20 与 Railway/Docker 镜像一致；Node 22 覆盖本地开发环境。
        # 二者对 data: URL 的模块解析严格程度不同（tsx 下会出现只在 20 上复现的
        # ERR_UNSUPPORTED_RESOLVE_REQUEST），所以两个版本都必须跑。
        node-version: ["20", "22"]

    env:
      # 集成测试用进程内 Postgres（pglite），不需要外部数据库服务。
      # 这里给一个占位串，仅用于让 lib/db.ts 的 conn() 不抛「缺少 DATABASE_URL」。
      DATABASE_URL: postgres://mock/mock
      PGLITE_TEST: "1"
      ENABLE_MOCK_PROVIDER: "1"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      # Worker 启动冒烟测试用它跑真实进程，与 Railway 的 Node 20 对齐
      - name: Expose Node binary for startup smoke test
        run: echo "NODE20_BIN=$(which node)" >> $GITHUB_ENV

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --reporter=default --reporter=junit --outputFile=reports/junit.xml
        continue-on-error: false

      # 关键冒烟：必须真正阻断 —— 不再吞掉失败，Worker 起不来就红灯
      - name: Worker startup smoke (blocking)
        run: |
          mkdir -p reports
          set -o pipefail
          NODE20_BIN="$(which node)" npx vitest run tests/worker-startup.test.ts \
            2>&1 | tee reports/worker-startup.log

      # queue-only 冒烟：功能失败必须红灯（性能数字仅作为 Artifact 参考）
      - name: Queue-only smoke (blocking)
        env:
          LOAD_MODE: queue-only
          LOAD_USERS: "50"
          LOAD_RAMP_SEC: "5"
          LOAD_OUT: reports/load-test.json
          BASE_URL: http://127.0.0.1:3000
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/nuedc_ci?sslmode=disable
          ENABLE_MOCK_PROVIDER: "1"
        run: |
          mkdir -p reports
          set -o pipefail
          npm run db:init
          npx next build > reports/build.log 2>&1
          npx next start -p 3000 > reports/server.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:3000/api/health > /dev/null && break
            sleep 2
          done
          npx tsx scripts/load-test.mts 2>&1 | tee reports/load-test-summary.txt
          node scripts/assert-load-result.mjs reports/load-test.json

      - name: Build
        run: npm run build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-node${{ matrix.node-version }}
          path: reports/
          if-no-files-found: warn
          retention-days: 14
