name: Load Test (heavy)

# 重型验证：不在每次 push 上跑，避免拖慢日常 CI。
#
# 两个 Job 完全隔离，各自独立的 Postgres service，互不共用数据库。
# 之前放在同一个 Job 会出问题：Worker 在 queue-only 之前就启动，
# 把本该只入队的任务消费掉，既破坏 queue-only 的队列深度指标，
# 也让 mock-provider 的统计混入前一阶段的残留数据。
on:
  workflow_dispatch:
    inputs:
      queue_users:
        description: "queue-only 用户数"
        required: false
        default: "100"
      mock_users:
        description: "mock-provider 用户数"
        required: false
        default: "300"
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: read

env:
  ADMIN_API_KEY: ci-heavy-admin-key
  DB_DRIVER: postgres_pool
  PGLITE_TEST: "0"
  ENABLE_MOCK_PROVIDER: "1"
  NEXT_TELEMETRY_DISABLED: "1"
  BASE_URL: http://127.0.0.1:3000

jobs:
  # ============ Job 1：只入队，不启动 Worker ============
  queue-only:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_USER: ci
          POSTGRES_DB: nuedc_queue
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/nuedc_queue

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: |
          mkdir -p reports
          npm ci

      - name: Migrate
        run: npm run db:init

      - name: Build
        run: npm run build

      - name: Start server
        run: |
          set -o pipefail
          DATABASE_URL="$DATABASE_URL" DB_DRIVER=postgres_pool PGLITE_TEST=0 \
          ENABLE_MOCK_PROVIDER=1 ADMIN_API_KEY="$ADMIN_API_KEY" \
            npx next start -p 3000 > reports/server.log 2>&1 &
          echo $! > reports/server.pid
          ready=0
          for i in $(seq 1 60); do
            if curl -sf "$BASE_URL/api/health" > /dev/null; then ready=1; break; fi
            if ! kill -0 "$(cat reports/server.pid)" 2>/dev/null; then
              echo "next start 进程已退出"; break
            fi
            sleep 2
          done
          if [ "$ready" -ne 1 ]; then
            echo "服务健康检查在 60 次后仍失败"
            tail -80 reports/server.log || true
            exit 1
          fi
          echo "服务就绪"

      # queue-only 不需要 Worker，只要求 Web + DB 正常
      - name: Preflight readiness (web+db only)
        run: |
          set -o pipefail
          node scripts/assert-readiness.mjs --mode=queue-only \
            --url="$BASE_URL/api/admin/readiness" \
            --out=reports/readiness-before.json

      - name: Queue-only load
        env:
          LOAD_MODE: queue-only
          LOAD_USERS: ${{ github.event.inputs.queue_users || '100' }}
          LOAD_RAMP_SEC: "20"
          LOAD_OUT: reports/queue-only.json
        run: |
          set -o pipefail
          npx tsx scripts/load-test.mts 2>&1 | tee reports/queue-only-summary.txt
          node scripts/assert-load-result.mjs reports/queue-only.json

      - name: Readiness after
        if: always()
        run: |
          node scripts/assert-readiness.mjs --mode=report-only \
            --url="$BASE_URL/api/admin/readiness" \
            --out=reports/readiness-after.json

      - name: Collect DB stats
        if: always()
        run: |
          {
            echo "=== 队列深度（按优先级）==="
            PGPASSWORD=ci psql -h 127.0.0.1 -U ci -d nuedc_queue -c \
              "SELECT priority, status, COUNT(*) FROM agent_tasks GROUP BY 1,2 ORDER BY 1;"
            echo "=== 最老排队任务（秒）==="
            PGPASSWORD=ci psql -h 127.0.0.1 -U ci -d nuedc_queue -c \
              "SELECT COALESCE(MAX(EXTRACT(EPOCH FROM (now()-created_at))),0) FROM agent_tasks WHERE status='queued';"
            echo "=== 唯一任务数 ==="
            PGPASSWORD=ci psql -h 127.0.0.1 -U ci -d nuedc_queue -c \
              "SELECT COUNT(DISTINCT task_id) AS unique_tasks, COUNT(*) AS rows FROM agent_tasks;"
            echo "=== 配额计数 ==="
            PGPASSWORD=ci psql -h 127.0.0.1 -U ci -d nuedc_queue -c \
              "SELECT owner, kind, used FROM quota_counters ORDER BY used DESC LIMIT 20;"
          } > reports/db-stats.txt 2>&1
          cat reports/db-stats.txt

      - name: Stop server
        if: always()
        run: |
          if [ -f reports/server.pid ]; then
            pid="$(cat reports/server.pid)"
            kill "$pid" 2>/dev/null || true; sleep 2; kill -9 "$pid" 2>/dev/null || true
          fi
          pkill -f "next start -p 3000" 2>/dev/null || true

      - name: Upload queue-only reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heavy-queue-only
          path: reports/
          if-no-files-found: warn
          retention-days: 30

  # ============ Job 2：端到端执行，需要 Worker ============
  mock-provider:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_USER: ci
          POSTGRES_DB: nuedc_mock
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/nuedc_mock

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: |
          mkdir -p reports
          npm ci

      - name: Migrate
        run: npm run db:init

      - name: Build
        run: npm run build

      - name: Start server
        run: |
          set -o pipefail
          DATABASE_URL="$DATABASE_URL" DB_DRIVER=postgres_pool PGLITE_TEST=0 \
          ENABLE_MOCK_PROVIDER=1 ADMIN_API_KEY="$ADMIN_API_KEY" \
            npx next start -p 3000 > reports/server.log 2>&1 &
          echo $! > reports/server.pid
          ready=0
          for i in $(seq 1 60); do
            if curl -sf "$BASE_URL/api/health" > /dev/null; then ready=1; break; fi
            if ! kill -0 "$(cat reports/server.pid)" 2>/dev/null; then
              echo "next start 进程已退出"; break
            fi
            sleep 2
          done
          if [ "$ready" -ne 1 ]; then
            echo "服务健康检查在 60 次后仍失败"
            tail -80 reports/server.log || true
            exit 1
          fi
          echo "服务就绪"

      - name: Start worker
        run: |
          DATABASE_URL="$DATABASE_URL" DB_DRIVER=postgres_pool PGLITE_TEST=0 \
          ENABLE_MOCK_PROVIDER=1 WORKER_ID=ci-worker-1 \
            npx tsx scripts/agent-worker.mts > reports/worker.log 2>&1 &
          echo $! > reports/worker.pid
          sleep 8
          tail -10 reports/worker.log || true

      # mock-provider 必须有 Live Worker，否则任务永远排队
      - name: Preflight readiness (require live worker)
        run: |
          set -o pipefail
          node scripts/assert-readiness.mjs --mode=mock-provider \
            --url="$BASE_URL/api/admin/readiness" \
            --out=reports/readiness-before.json

      - name: Mock-provider load
        env:
          LOAD_MODE: mock-provider
          LOAD_USERS: ${{ github.event.inputs.mock_users || '300' }}
          LOAD_RAMP_SEC: "60"
          LOAD_TIMEOUT_SEC: "600"
          ALLOW_MOCK_ASSUMED: "1"
          LOAD_OUT: reports/mock-provider.json
        run: |
          set -o pipefail
          npx tsx scripts/load-test.mts 2>&1 | tee reports/mock-provider-summary.txt
          node scripts/assert-load-result.mjs reports/mock-provider.json

      - name: Readiness after
        if: always()
        run: |
          node scripts/assert-readiness.mjs --mode=report-only \
            --url="$BASE_URL/api/admin/readiness" \
            --out=reports/readiness-after.json

      - name: Collect DB stats
        if: always()
        run: |
          {
            echo "=== 任务状态分布 ==="
            PGPASSWORD=ci psql -h 127.0.0.1 -U ci -d nuedc_mock -c \
              "SELECT status, COUNT(*) FROM agent_tasks GROUP BY status ORDER BY 2 DESC;"
            echo "=== lease reclaim（重试过的任务）==="
            PGPASSWORD=ci psql -h 127.0.0.1 -U ci -d nuedc_mock -c \
              "SELECT COUNT(*) AS reclaimed FROM agent_tasks WHERE attempts > 1;"
            echo "=== duplicate artifacts ==="
            PGPASSWORD=ci psql -h 127.0.0.1 -U ci -d nuedc_mock -c \
              "SELECT project_id, type, version, COUNT(*) FROM artifacts GROUP BY 1,2,3 HAVING COUNT(*)>1;"
            echo "=== Worker 心跳 ==="
            PGPASSWORD=ci psql -h 127.0.0.1 -U ci -d nuedc_mock -c \
              "SELECT worker_id, heavy_slots, light_slots, in_flight FROM worker_heartbeats;"
          } > reports/db-stats.txt 2>&1
          cat reports/db-stats.txt

      - name: Stop worker and server
        if: always()
        run: |
          for f in reports/worker.pid reports/server.pid; do
            if [ -f "$f" ]; then
              pid="$(cat $f)"
              kill "$pid" 2>/dev/null || true; sleep 2; kill -9 "$pid" 2>/dev/null || true
            fi
          done
          pkill -f "next start -p 3000" 2>/dev/null || true
          pkill -f "agent-worker.mts" 2>/dev/null || true

      - name: Upload mock-provider reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heavy-mock-provider
          path: reports/
          if-no-files-found: warn
          retention-days: 30
