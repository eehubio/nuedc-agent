name: Firmware Build Runner
# 真实交叉编译：认领线上排队的 build_jobs，用 arm-none-eabi-gcc 编译并回写
on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi
      - run: npm ci
      - run: npm run build:runner
        env:
          BASE_URL: ${{ secrets.APP_BASE_URL }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          RUNNER_NAME: github-actions
